name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PendriveRescue.sln

      - name: Build
        run: dotnet build PendriveRescue.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PendriveRescue.sln --configuration Release --no-build
